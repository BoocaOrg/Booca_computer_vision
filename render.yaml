services:
  - type: web
    name: matchvision-cv
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      cd /opt/render/project/src && uvicorn cv_service.cv_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTHON_VERSION
        value: "3.11.11"
